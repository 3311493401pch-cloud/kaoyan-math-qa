services:
  - type: web
    name: kaoyan-math-qa
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('BAAI/bge-small-zh-v1.5')"
    preDeployCommand: python kb_builder.py
    startCommand: python app.py
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
    healthCheckPath: /
    startupTimeout: 120